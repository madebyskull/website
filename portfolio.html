<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO | JONA DOMKE</title>
    <link rel="stylesheet" href="https://use.typekit.net/lhr6ouv.css">
    <link rel="stylesheet" href="style-portfolio.css">
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <header>
        <nav>
            <a href="contact.html">contact</a>
            <a href="index.html" class="small-logo">JONA|DOMKE</a>
            <a href="#" class="active">portfolio</a>
        </nav>
    </header>

    <main class="portfolio-main">
        <section class="portfolio-header">
            <h1 class="fade-in">Selected<br>Works</h1>
            <p class="subtitle fade-in">2022 — 2024</p>
        </section>

        <div class="work-grid">
            <div class="work-item wide fade-in">
                <div class="work-image-wrapper">
                    <img src="https://picsum.photos/1200/800?random=10" alt="Projekt Eins">
                    <span class="work-number">01</span>
                </div>
                <div class="work-info">
                    <h2>Urban Silence</h2>
                    <p>Photography / Direction</p>
                </div>
            </div>

            <div class="work-item tall left fade-in">
                <div class="work-image-wrapper">
                    <img src="https://picsum.photos/800/1200?random=11" alt="Projekt Zwei">
                    <span class="work-number">02</span>
                </div>
                <div class="work-info">
                    <h2>Digital Nomad</h2>
                    <p>Branding</p>
                </div>
            </div>

            <div class="work-item small right fade-in">
                <div class="work-image-wrapper">
                    <img src="https://picsum.photos/800/800?random=12" alt="Projekt Drei">
                    <span class="work-number">03</span>
                </div>
                <div class="work-info">
                    <h2>Chrome Hearts</h2>
                    <p>3D Design</p>
                </div>
            </div>

            <div class="work-item standard fade-in">
                <div class="work-image-wrapper">
                    <img src="https://picsum.photos/1000/600?random=13" alt="Projekt Vier">
                    <span class="work-number">04</span>
                </div>
                <div class="work-info">
                    <h2>Vanguard</h2>
                    <p>Web Experience</p>
                </div>
            </div>
        </div>

        <section class="portfolio-footer-cta">
            <a href="index.html" class="back-home-link">back to start</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 JONA DOMKE</p>
        <a href="#">Impressum</a>
    </footer>

    <script src="script-portfolio.js"></script>
</body>
</html>
