<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | JONA DOMKE</title>
    <link rel="stylesheet" href="https://use.typekit.net/lhr6ouv.css">
    <link rel="stylesheet" href="style-contact.css">
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <header>
        <nav>
            <a href="contact.html" class="active">contact</a>
            <a href="index.html" class="small-logo">JONA|DOMKE</a>
            <a href="portfolio.html">portfolio</a>
        </nav>
    </header>

    <main class="contact-container">
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <form id="stepForm" class="step-form" name="contact" method="POST" data-netlify="true">
            
            <input type="hidden" name="form-name" value="contact" />
            
            <div class="form-step active" data-step="1">
                <span class="step-number">01</span>
                <h2>Wie darf ich dich nennen?</h2>
                <div class="input-wrapper">
                    <input type="text" name="name" placeholder="Dein Name" autocomplete="off" required>
                </div>
            </div>

            <div class="form-step" data-step="2">
                <span class="step-number">02</span>
                <h2>Wie lautet deine E-Mail Adresse?</h2>
                <div class="input-wrapper">
                    <input type="email" name="email" placeholder="mail@beispiel.de" autocomplete="off" required>
                </div>
            </div>

            <div class="form-step" data-step="3">
                <span class="step-number">03</span>
                <h2>Für welches Unternehmen arbeitest du?</h2>
                <div class="input-wrapper">
                    <input type="text" name="company" placeholder="Deine Firma (optional)" autocomplete="off">
                </div>
            </div>

            <div class="form-step" data-step="4">
                <span class="step-number">04</span>
                <h2>Beschreibe dein Projekt kurz.</h2>
                <div class="input-wrapper">
                    <textarea name="project" placeholder="Erzähl mir davon..." rows="1"></textarea>
                </div>
            </div>

            <div class="form-step" data-step="5">
                <span class="step-number">05</span>
                <h2>Gibt es noch besondere Anmerkungen?</h2>
                <div class="input-wrapper">
                    <input type="text" name="notes" placeholder="Deine Nachricht" autocomplete="off">
                </div>
            </div>

            <div class="form-step" data-step="6">
                <span class="step-number">06</span>
                <h2>Bereit zum Absenden?</h2>
                <button type="submit" class="submit-btn">Nachricht schicken</button>
            </div>
        </form>

        <div class="form-navigation">
            <button type="button" id="prevBtn" class="nav-arrow left" aria-label="Zurück">
                <svg width="40" height="20" viewBox="0 0 40 20">
                    <path d="M10 2L2 10L10 18M2 10H38" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
            </button>
            
            <button type="button" id="nextBtn" class="nav-arrow right" aria-label="Weiter">
                <svg width="40" height="20" viewBox="0 0 40 20">
                    <path d="M30 2L38 10L30 18M38 10H2" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
            </button>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 JONA DOMKE</p>
        <a href="index.html">back to home</a>
    </footer>

    <script src="script-contact.js"></script>
</body>
</html>
